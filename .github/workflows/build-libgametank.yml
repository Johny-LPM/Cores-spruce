name: Build libgametank

on:
  workflow_dispatch:
    inputs:
      core_ref:
        description: 'Core git ref (commit/tag/branch, blank for latest)'
        default: ''
  workflow_call:
    inputs:
      core_ref:
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure beta release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="beta-${{ github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Beta Build (${{ github.ref_name }})" \
              --prerelease \
              --notes "Core builds from ${{ github.ref_name }}" \
            || true

      - name: Install Rust toolchain and targets
        run: |
          rustup target add aarch64-unknown-linux-gnu armv7-unknown-linux-gnueabihf
          cargo install cargo-zigbuild

      - name: Clone gametank-sdk
        run: |
          git clone --depth 1 https://github.com/dwbrite/gametank-sdk.git
          REF="${{ inputs.core_ref }}"
          if [ -n "$REF" ]; then
            cd gametank-sdk && git fetch origin && git checkout "$REF" && cd ..
          fi

      - name: Build arm64
        run: |
          mkdir -p output/cores64
          cd gametank-sdk/tools/gte/libretro
          cargo zigbuild --target aarch64-unknown-linux-gnu.2.23 --release
          cp ../../../target/aarch64-unknown-linux-gnu/release/libgametank_libretro.so \
            ${{ github.workspace }}/output/cores64/libgametank_libretro.so
        || echo "::warning::arm64 build failed for libgametank"

      - name: Build armhf
        run: |
          mkdir -p output/cores
          cd gametank-sdk/tools/gte/libretro
          cargo zigbuild --target armv7-unknown-linux-gnueabihf.2.23 --release
          cp ../../../target/armv7-unknown-linux-gnueabihf/release/libgametank_libretro.so \
            ${{ github.workspace }}/output/cores/libgametank_libretro.so
        || echo "::warning::armhf build failed for libgametank"

      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd output
          CONTENTS=""
          [ -f cores64/libgametank_libretro.so ] && CONTENTS="$CONTENTS cores64/"
          [ -f cores/libgametank_libretro.so ] && CONTENTS="$CONTENTS cores/"
          if [ -n "$CONTENTS" ]; then
            zip -r libgametank_libretro.zip $CONTENTS
            gh release upload "beta-${{ github.ref_name }}" libgametank_libretro.zip --clobber
          else
            echo "::error::No builds succeeded for libgametank"
            exit 1
          fi
