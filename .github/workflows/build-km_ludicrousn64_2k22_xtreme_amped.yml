name: Build km_ludicrousn64_2k22_xtreme_amped

on:
  workflow_dispatch:
    inputs:
      core_ref:
        description: 'Core git ref (commit/tag/branch, blank for latest)'
        default: ''
  workflow_call:
    inputs:
      core_ref:
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure beta release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="beta-${{ github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Beta Build (${{ github.ref_name }})" \
              --prerelease \
              --notes "Core builds from ${{ github.ref_name }}" \
            || true

      - name: Download Docker images
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download toolchains --pattern "cores-arm64.tar.gz" --dir .
          gh release download toolchains --pattern "cores-armhf.tar.gz" --dir .

      - name: Load Docker images
        run: |
          gunzip -c cores-arm64.tar.gz | docker load
          gunzip -c cores-armhf.tar.gz | docker load

      - name: Build arm64
        run: |
          mkdir -p output/cores64
          docker run --rm -v ${{ github.workspace }}/output:/output cores-arm64 \
            bash -c '
              git clone --depth 1 https://github.com/KMFDManic/ludicrous-2k22-xtreme-amped.git
              cd ludicrous-2k22-xtreme-amped
              REF="${{ inputs.core_ref }}"
              [ -n "$REF" ] && git fetch origin && git checkout "$REF"
              make platform=unix CC=${HOST_CC}-gcc CXX=${HOST_CC}-g++ -j$(nproc)
              find . -name "*_libretro.so" -exec cp {} /output/cores64/km_ludicrousn64_2k22_xtreme_amped_libretro.so \;
            ' || echo "::warning::arm64 build failed for km_ludicrousn64_2k22_xtreme_amped"

      - name: Build armhf
        run: |
          mkdir -p output/cores
          docker run --rm -v ${{ github.workspace }}/output:/output cores-armhf \
            bash -c '
              git clone --depth 1 https://github.com/KMFDManic/ludicrous-2k22-xtreme-amped.git
              cd ludicrous-2k22-xtreme-amped
              REF="${{ inputs.core_ref }}"
              [ -n "$REF" ] && git fetch origin && git checkout "$REF"
              make platform=unix CC=${HOST_CC}-gcc CXX=${HOST_CC}-g++ -j$(nproc)
              find . -name "*_libretro.so" -exec cp {} /output/cores/km_ludicrousn64_2k22_xtreme_amped_libretro.so \;
            ' || echo "::warning::armhf build failed for km_ludicrousn64_2k22_xtreme_amped"

      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd output
          CONTENTS=""
          [ -f cores64/km_ludicrousn64_2k22_xtreme_amped_libretro.so ] && CONTENTS="$CONTENTS cores64/"
          [ -f cores/km_ludicrousn64_2k22_xtreme_amped_libretro.so ] && CONTENTS="$CONTENTS cores/"
          if [ -n "$CONTENTS" ]; then
            zip -r km_ludicrousn64_2k22_xtreme_amped_libretro.zip $CONTENTS
            gh release upload "beta-${{ github.ref_name }}" km_ludicrousn64_2k22_xtreme_amped_libretro.zip --clobber
          else
            echo "::error::No builds succeeded for km_ludicrousn64_2k22_xtreme_amped"
            exit 1
          fi
