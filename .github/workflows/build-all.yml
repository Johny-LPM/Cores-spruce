name: Build All Cores

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger both batches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-all-1.yml --repo ${{ github.repository }}
          gh workflow run build-all-2.yml --repo ${{ github.repository }}
